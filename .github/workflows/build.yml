name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build --workspace frontend

      - name: Archive build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: frontend-dist-${{ matrix.node-version }}
          path: frontend/dist
          retention-days: 1

  build-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install build

      - name: Verify backend structure
        run: |
          cd backend
          python -c "from app.main import app; print('✓ FastAPI app imports successfully')"
          python -c "from app.routes.health import router; print('✓ Health router imports successfully')"

      - name: Check for syntax errors
        run: |
          cd backend
          python -m py_compile app/main.py app/routes/health.py
