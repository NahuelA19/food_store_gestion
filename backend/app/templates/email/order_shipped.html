<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { font-family: Arial, sans-serif; color: #333; margin: 0; padding: 0; }
  .container { max-width: 600px; margin: 0 auto; padding: 20px; }
  .header { background: #3b82f6; color: white; padding: 24px; text-align: center; border-radius: 8px 8px 0 0; }
  .header h1 { margin: 0; font-size: 24px; }
  .body { padding: 24px; background: #f9fafb; }
  .info-box { background: white; padding: 16px; border-radius: 8px; margin: 16px 0; }
  .footer { text-align: center; padding: 16px; color: #6b7280; font-size: 12px; }
  .button { display: inline-block; padding: 12px 24px; background: #3b82f6; color: white; text-decoration: none; border-radius: 6px; }
</style>
</head>
<body>
<div class="container">
  <div class="header"><h1>Your Order Has Shipped!</h1></div>
  <div class="body">
    <p>Hi {{ user_name }},</p>
    <p>Your order is on its way!</p>
    <div class="info-box">
      <p><strong>Order #{{ order_id }}</strong></p>
      <p>{{ message }}</p>
    </div>
  </div>
  <div class="footer">
    <p>Food Store — Tracking your order</p>
  </div>
</div>
</body>
</html>
