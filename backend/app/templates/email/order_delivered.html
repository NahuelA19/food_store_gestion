<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { font-family: Arial, sans-serif; color: #333; margin: 0; padding: 0; }
  .container { max-width: 600px; margin: 0 auto; padding: 20px; }
  .header { background: #22c55e; color: white; padding: 24px; text-align: center; border-radius: 8px 8px 0 0; }
  .header h1 { margin: 0; font-size: 24px; }
  .body { padding: 24px; background: #f9fafb; }
  .info-box { background: white; padding: 16px; border-radius: 8px; margin: 16px 0; }
  .footer { text-align: center; padding: 16px; color: #6b7280; font-size: 12px; }
</style>
</head>
<body>
<div class="container">
  <div class="header"><h1>Order Delivered!</h1></div>
  <div class="body">
    <p>Hi {{ user_name }},</p>
    <p>Your order has been delivered. We hope you enjoy your products!</p>
    <div class="info-box">
      <p><strong>Order #{{ order_id }}</strong></p>
      <p>{{ message }}</p>
    </div>
    <p style="text-align:center; margin-top: 16px;">Don't forget to leave a review!</p>
  </div>
  <div class="footer">
    <p>Food Store — Thank you for shopping with us!</p>
  </div>
</div>
</body>
</html>
